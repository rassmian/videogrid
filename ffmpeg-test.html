<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ffmpeg.wasm · Transcode Test</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;800&display=swap');

  :root {
    --bg: #0a0a0a; --surface: #141414; --border: #2a2a2a;
    --accent: #e8ff00; --accent2: #ff6b35; --text: #f0f0f0;
    --muted: #666; --success: #00ff88; --error: #ff3b5c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', monospace; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem 1rem; }
  header { text-align: center; margin-bottom: 3rem; }
  h1 { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(1.8rem, 5vw, 2.8rem); letter-spacing: -0.02em; line-height: 1; margin-bottom: 0.5rem; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 2px; padding: 1.5rem; width: 100%; max-width: 560px; margin-bottom: 1rem; }
  .card-label { font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .card-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .btn { display: inline-block; padding: 0.75rem 1.5rem; background: var(--accent); color: #000; font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 0.8rem; letter-spacing: 0.05em; text-transform: uppercase; border: none; border-radius: 2px; cursor: pointer; transition: opacity 0.15s, transform 0.1s; width: 100%; }
  .btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn.secondary { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn.secondary:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .log { font-size: 0.72rem; line-height: 1.8; color: var(--muted); max-height: 280px; overflow-y: auto; }
  .log-entry { display: flex; gap: 0.75rem; padding: 0.15rem 0; border-bottom: 1px solid #1a1a1a; animation: fadeIn 0.2s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-4px); } to { opacity: 1; transform: none; } }
  .log-time { color: var(--accent2); min-width: 70px; }
  .log-msg { color: var(--text); }
  .log-msg.success { color: var(--success); }
  .log-msg.error { color: var(--error); }
  .log-msg.highlight { color: var(--accent); font-weight: 700; }
  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); margin-top: 1rem; }
  .metric { background: var(--surface); padding: 1rem; text-align: center; }
  .metric-val { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.8rem; color: var(--accent); line-height: 1; margin-bottom: 0.25rem; }
  .metric-val.pending { color: var(--muted); font-size: 1.2rem; }
  .metric-label { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  video { width: 100%; border-radius: 2px; background: #000; display: block; }
  .video-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 0.75rem; }
  .video-label { font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.4rem; text-align: center; }
  .badge { display: inline-block; padding: 0.2rem 0.5rem; font-size: 0.6rem; border-radius: 2px; margin-left: 0.5rem; }
  .badge.webm { background: #1a2a3a; color: #4ab0ff; }
  .badge.mp4 { background: #1a3a1a; color: var(--success); }
  .status-bar { display: flex; align-items: center; gap: 0.5rem; font-size: 0.7rem; color: var(--muted); margin-top: 0.75rem; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  .dot.active { background: var(--accent); animation: pulse 1s infinite; }
  .dot.success { background: var(--success); }
  .dot.error { background: var(--error); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .device-info { font-size: 0.65rem; color: var(--muted); line-height: 1.6; }
  .device-info span { color: var(--text); }
</style>
</head>
<body>

<header>
  <h1>ffmpeg<span>.wasm</span></h1>
  <p class="subtitle">Transcode Performance Test · WebM → MP4</p>
</header>

<div class="card">
  <div class="card-label">Device</div>
  <div class="device-info" id="deviceInfo">Detecting…</div>
</div>

<div class="card">
  <div class="card-label">Step 1 — Load</div>
  <button class="btn" id="btnLoad" onclick="loadFFmpeg()">① Load ffmpeg.wasm</button>
  <div class="status-bar"><div class="dot" id="loadDot"></div><span id="loadStatus">Not loaded</span></div>
</div>

<div class="card">
  <div class="card-label">Step 2 — Record &amp; Transcode</div>
  <button class="btn" id="btnRecord" onclick="startTest()" disabled>② Record 1s clip &amp; transcode</button>
  <div class="status-bar"><div class="dot" id="recDot"></div><span id="recStatus">Waiting for ffmpeg</span></div>
</div>

<div class="card">
  <div class="card-label">Results</div>
  <div class="metric-grid">
    <div class="metric"><div class="metric-val pending" id="metLoad">—</div><div class="metric-label">Load time (s)</div></div>
    <div class="metric"><div class="metric-val pending" id="metTranscode">—</div><div class="metric-label">Transcode time (s)</div></div>
    <div class="metric"><div class="metric-val pending" id="metWebmSize">—</div><div class="metric-label">WebM size (KB)</div></div>
    <div class="metric"><div class="metric-val pending" id="metMp4Size">—</div><div class="metric-label">MP4 size (KB)</div></div>
  </div>
</div>

<div class="card" id="previewCard" style="display:none">
  <div class="card-label">Preview</div>
  <div class="video-row">
    <div><div class="video-label">Source <span class="badge webm">webm</span></div><video id="vidWebm" autoplay loop muted playsinline></video></div>
    <div><div class="video-label">Output <span class="badge mp4">mp4</span></div><video id="vidMp4" autoplay loop muted playsinline></video></div>
  </div>
  <div style="margin-top:1rem;display:flex;gap:0.5rem;">
    <button class="btn secondary" onclick="downloadMp4()">↓ Download MP4</button>
    <button class="btn secondary" onclick="startTest()">↺ Repeat</button>
  </div>
</div>

<div class="card">
  <div class="card-label">Log</div>
  <div class="log" id="log"></div>
</div>

<script type="module">
  const log = (msg, type = '') => {
    const ts = (performance.now() / 1000).toFixed(2) + 's';
    const el = document.createElement('div');
    el.className = 'log-entry';
    el.innerHTML = `<span class="log-time">${ts}</span><span class="log-msg ${type}">${msg}</span>`;
    const logEl = document.getElementById('log');
    logEl.appendChild(el);
    logEl.scrollTop = logEl.scrollHeight;
  };

  const setStatus = (dotId, statusId, cls, msg) => {
    document.getElementById(dotId).className = 'dot ' + cls;
    document.getElementById(statusId).textContent = msg;
  };

  const setMetric = (id, val) => {
    const el = document.getElementById(id);
    el.textContent = val;
    el.className = 'metric-val';
  };

  // Device info
  const ua = navigator.userAgent;
  const isAndroid = /android/i.test(ua);
  const isIOS = /iphone|ipad|ipod/i.test(ua);
  const sab = typeof SharedArrayBuffer !== 'undefined';
  document.getElementById('deviceInfo').innerHTML =
    `Platform: <span>${isAndroid ? 'Android' : isIOS ? 'iOS' : 'Desktop/Other'}</span><br>` +
    `Cores: <span>${navigator.hardwareConcurrency || '?'}</span> · RAM: <span>${navigator.deviceMemory ? navigator.deviceMemory + 'GB' : '?'}</span><br>` +
    `SharedArrayBuffer: <span style="color:${sab ? 'var(--success)' : 'var(--error)'}">${sab ? 'Available ✓' : 'Unavailable ✗'}</span><br>` +
    `<span style="font-size:0.6rem;word-break:break-all;opacity:0.6">${ua.substring(0,120)}</span>`;

  let ff = null;
  let mp4Blob = null;

  window.loadFFmpeg = async () => {
    document.getElementById('btnLoad').disabled = true;
    setStatus('loadDot', 'loadStatus', 'active', 'Importing…');
    log('Importing @ffmpeg/ffmpeg@0.12 ESM…');
    const t0 = performance.now();

    try {
      const { FFmpeg } = await import('https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js');
      ff = new FFmpeg();
      ff.on('log', ({ message }) => {
        if (/error/i.test(message)) log('ffmpeg: ' + message, 'error');
      });
      ff.on('progress', ({ progress }) => {
        if (progress > 0) document.getElementById('loadStatus').textContent =
          `Loading core… ${Math.round(progress * 100)}%`;
      });

      log('Loading core WASM (first load ~10–30MB)…');
      await ff.load({
        coreURL:  'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.js',
        wasmURL:  'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm/ffmpeg-core.wasm',
      });

      const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
      setMetric('metLoad', elapsed);
      setStatus('loadDot', 'loadStatus', 'success', `Loaded in ${elapsed}s`);
      log(`Ready in ${elapsed}s`, 'success');
      document.getElementById('btnRecord').disabled = false;

    } catch (err) {
      setStatus('loadDot', 'loadStatus', 'error', 'Failed');
      log('Error: ' + err.message, 'error');
      document.getElementById('btnLoad').disabled = false;
    }
  };

  window.startTest = async () => {
    document.getElementById('btnRecord').disabled = true;
    document.getElementById('previewCard').style.display = 'none';
    mp4Blob = null;

    setStatus('recDot', 'recStatus', 'active', 'Requesting camera…');
    log('Requesting camera…');

    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480, frameRate: 30 }, audio: false });
      log('Camera acquired');
    } catch (err) {
      setStatus('recDot', 'recStatus', 'error', 'Camera denied');
      log('Camera error: ' + err.message, 'error');
      document.getElementById('btnRecord').disabled = false;
      return;
    }

    const mimeType = ['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm'].find(t => MediaRecorder.isTypeSupported(t)) || '';
    log(`mimeType: ${mimeType || 'browser default'}`);
    setStatus('recDot', 'recStatus', 'active', 'Recording 1s…');

    const chunks = [];
    const recorder = new MediaRecorder(stream, { mimeType: mimeType || undefined, videoBitsPerSecond: 2_000_000 });
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };

    await new Promise(resolve => { recorder.onstop = resolve; recorder.start(); setTimeout(() => recorder.stop(), 1000); });
    stream.getTracks().forEach(t => t.stop());

    const webmBlob = new Blob(chunks, { type: recorder.mimeType });
    const webmKB = (webmBlob.size / 1024).toFixed(1);
    setMetric('metWebmSize', webmKB);
    log(`WebM: ${webmKB} KB`);
    document.getElementById('vidWebm').src = URL.createObjectURL(webmBlob);

    setStatus('recDot', 'recStatus', 'active', 'Transcoding…');
    log('Transcoding WebM → MP4…');
    const t0 = performance.now();

    try {
      const { fetchFile } = await import('https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js');
      await ff.writeFile('input.webm', await fetchFile(webmBlob));
      await ff.exec(['-i','input.webm','-c:v','libx264','-preset','ultrafast','-crf','28','-movflags','+faststart','-an','output.mp4']);

      const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
      setMetric('metTranscode', elapsed);

      const data = await ff.readFile('output.mp4');
      mp4Blob = new Blob([data.buffer], { type: 'video/mp4' });
      const mp4KB = (mp4Blob.size / 1024).toFixed(1);
      setMetric('metMp4Size', mp4KB);

      await ff.deleteFile('input.webm');
      await ff.deleteFile('output.mp4');

      const t = parseFloat(elapsed);
      const verdict = t < 1 ? '🟢 Fast — viable' : t < 3 ? '🟡 Acceptable — add spinner' : '🔴 Too slow';
      log(`Done: ${elapsed}s · ${mp4KB} KB`, 'highlight');
      log(verdict, t < 1 ? 'success' : t < 3 ? '' : 'error');
      setStatus('recDot', 'recStatus', 'success', `Done in ${elapsed}s`);

      document.getElementById('vidMp4').src = URL.createObjectURL(mp4Blob);
      document.getElementById('previewCard').style.display = 'block';

    } catch (err) {
      const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
      setStatus('recDot', 'recStatus', 'error', 'Failed');
      log(`Error after ${elapsed}s: ${err.message}`, 'error');
    }

    document.getElementById('btnRecord').disabled = false;
  };

  window.downloadMp4 = () => {
    if (!mp4Blob) return;
    const a = document.createElement('a');
    a.href = URL.createObjectURL(mp4Blob);
    a.download = 'test-output.mp4';
    a.click();
  };
</script>
</body>
</html>
